<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Ethereal Studio | Student Dashboard</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4a40e0",
                        "secondary": "#702ae1",
                        "surface-container": "#ede4ff",
                        "on-surface": "#32294f",
                        "on-surface-variant": "#5f557f",
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#faf4ff] text-[#32294f] min-h-screen">

    <aside class="hidden md:flex flex-col w-72 h-screen p-6 fixed left-0 top-0 bg-[#f5eeff] z-50">
        <h1 class="font-bold text-primary text-2xl mb-10">Ethereal Studio</h1>
        <nav class="space-y-2">
            <a class="flex items-center gap-4 px-4 py-3 bg-primary text-white rounded-full" href="#">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="text-sm font-semibold">Dashboard</span>
            </a>
        </nav>
    </aside>

    <main class="md:ml-72 p-6 md:p-10">
        <header class="mb-8">
            <h2 class="text-3xl font-extrabold mb-2">Good morning, Alex.</h2>
            <p class="text-on-surface-variant font-medium">
                Status: <span id="output" class="text-secondary font-bold">Connecting...</span>
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <section class="lg:col-span-5 bg-primary rounded-[2rem] p-6 text-white shadow-xl flex flex-col h-[600px]">
                <div class="flex items-center gap-3 mb-6">
                    <span class="material-symbols-outlined bg-white/20 p-2 rounded-xl">smart_toy</span>
                    <div>
                        <h3 class="font-bold">Academic Assistant</h3>
                        <p class="text-xs text-white/70">Powered by Gemini AI</p>
                    </div>
                </div>

                <div id="chatMessages" class="flex-1 space-y-4 mb-4 overflow-y-auto scrollbar-hide pr-2">
                    <div class="bg-white/10 rounded-2xl p-4 text-sm w-fit max-w-[85%]">
                        How can I help with your studies today?
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex gap-2">
                        <button class="quick-prompt bg-white/10 px-3 py-1 rounded-full text-xs">Explain DNA</button>
                        <button class="quick-prompt bg-white/10 px-3 py-1 rounded-full text-xs">Python Quiz</button>
                    </div>
                    <div class="relative">
                        <input id="chatInput" class="w-full bg-white/10 border-none rounded-2xl py-4 px-5 text-sm placeholder:text-white/50 focus:ring-2 focus:ring-white/30" placeholder="Ask anything..."/>
                        <button id="chatSend" class="absolute right-2 top-2 p-2 bg-white text-primary rounded-xl hover:bg-gray-100">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById("chatMessages");
        const chatInput = document.getElementById("chatInput");
        const chatSend = document.getElementById("chatSend");
        const statusOutput = document.getElementById("output");
        
        // REPLACE WITH YOUR ACTUAL RAILWAY URL
        const API_URL = "https://web-production-d1f9.up.railway.app";

        // Check Connection
        async function checkConnection() {
            try {
                const res = await fetch(`${API_URL}/api/data`);
                const data = await res.json();
                statusOutput.innerText = data.message || "Online";
            } catch (e) {
                statusOutput.innerText = "Offline";
            }
        }
        checkConnection();

        function addMessage(text, role) {
            const div = document.createElement("div");
            div.className = role === "user" 
                ? "bg-white/20 rounded-2xl p-4 text-sm w-fit max-w-[85%] ml-auto text-right" 
                : "bg-white/10 rounded-2xl p-4 text-sm w-fit max-w-[85%]";
            div.innerText = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            addMessage(text, "user");
            chatInput.value = "";
            chatInput.disabled = true;
            chatSend.disabled = true;

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();
                if (data.reply) {
                    addMessage(data.reply, "assistant");
                } else {
                    addMessage("Error: " + (data.error || "Unknown error"), "assistant");
                }
            } catch (e) {
                addMessage("Could not connect to server.", "assistant");
            } finally {
                // This re-enables the input so you can send more than one message
                chatInput.disabled = false;
                chatSend.disabled = false;
                chatInput.focus();
            }
        }

        chatSend.addEventListener("click", sendMessage);
        chatInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
        
        document.querySelectorAll(".quick-prompt").forEach(btn => {
            btn.addEventListener("click", () => {
                chatInput.value = btn.innerText;
                sendMessage();
            });
        });
    </script>
</body>
</html>
